      <stop offset="0%" stop-color="#d7efff"/>
      <stop offset="48%" stop-color="#90c1f2"/>
      <stop offset="100%" stop-color="#2f6840"/>
    </linearGradient>
    <radialGradient id="lakeGlow" cx="50%" cy="48%" r="38%">
      <stop offset="0%" stop-color="#b9e0f2" stop-opacity="0.95"/>
      <stop offset="65%" stop-color="#5d8eb1" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#355e7f" stop-opacity="0.5"/>
