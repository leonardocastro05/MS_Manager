<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS Manager</title>
    <link rel="stylesheet" href="css/intro.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Three.js for 3D intro -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- ==========================================
         3D CINEMATIC INTRO SCREEN
         Optimized Three.js racing intro
         ========================================== -->
    <div id="intro-screen" class="intro-screen">
        
        <!-- 3D Canvas -->
        <canvas id="intro-canvas"></canvas>
        
        <!-- Overlay Effects -->
        <div class="intro-overlay">
            <!-- Vignette -->
            <div class="vignette"></div>
            
            <!-- Flash effect for camera cuts -->
            <div class="flash-overlay" id="flash-overlay"></div>
        </div>
        
        <!-- Title (appears when cars cross finish) -->
        <div class="title-overlay">
            <h1 class="intro-title">MS MANAGER</h1>
            <p class="intro-subtitle">Racing Team Management</p>
        </div>
        
        <!-- Loading Progress -->
        <div class="loading-container">
            <div class="loading-bar">
                <div class="loading-progress" id="loading-progress"></div>
            </div>
            <p class="loading-text" id="loading-text">Cargando circuito...</p>
        </div>
        
        <!-- Skip Button -->
        <button id="skip-intro" class="skip-intro">SALTAR</button>
    </div>

    <!-- ==========================================
         AUTH SCREEN (Login/Register)
         ========================================== -->
    <div id="auth-screen" class="auth-screen hidden">
        <div class="stars"></div>
        <div class="twinkling"></div>
        <div class="auth-background"></div>
        
        <div class="auth-container">
            <div class="auth-header">
                <h2 class="auth-logo">MS MANAGER</h2>
                <p class="auth-subtitle">Sistema de Gestión</p>
            </div>
            
            <!-- Tabs Login/Register -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Iniciar Sesión</button>
                <button class="auth-tab" data-tab="register">Registrarse</button>
            </div>
            
            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-username">
                        <span class="icon">👤</span>
                        Usuario
                    </label>
                    <input type="text" id="login-username" name="username" required 
                           placeholder="Tu nombre de usuario" autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="login-password">
                        <span class="icon">🔒</span>
                        Contraseña
                    </label>
                    <input type="password" id="login-password" name="password" required 
                           placeholder="••••••••" autocomplete="current-password">
                </div>
                
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember-me">
                        <span class="checkmark"></span>
                        Recordarme
                    </label>
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>
                
                <button type="submit" class="btn-primary">
                    <span>Entrar</span>
                    <div class="btn-glow"></div>
                </button>
                
                <div class="form-message" id="login-message"></div>
            </form>
            
            <!-- Register Form -->
            <form id="register-form" class="auth-form hidden">
                <div class="form-group">
                    <label for="register-username">
                        <span class="icon">👤</span>
                        Nombre de usuario
                    </label>
                    <input type="text" id="register-username" name="username" required 
                           placeholder="Tu nombre de usuario" autocomplete="username"
                           minlength="3" maxlength="30" pattern="^[a-zA-Z0-9_]+$">
                </div>
                
                <div class="form-group">
                    <label for="register-team">
                        <span class="icon">⚽</span>
                        Nombre del equipo
                    </label>
                    <input type="text" id="register-team" name="teamName" required 
                           placeholder="Nombre de tu equipo" maxlength="50">
                </div>
                
                <div class="form-group">
                    <label for="register-email">
                        <span class="icon">📧</span>
                        Email <span style="color: rgba(255,255,255,0.4)">(opcional)</span>
                    </label>
                    <input type="email" id="register-email" name="email" 
                           placeholder="tu@email.com" autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="register-password">
                        <span class="icon">🔒</span>
                        Contraseña
                    </label>
                    <input type="password" id="register-password" name="password" required 
                           placeholder="Mínimo 8 caracteres" autocomplete="new-password">
                    <div class="password-strength" id="password-strength">
                        <div class="strength-bar"></div>
                        <span class="strength-text">Seguridad de contraseña</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="register-confirm">
                        <span class="icon">🔐</span>
                        Confirmar contraseña
                    </label>
                    <input type="password" id="register-confirm" name="confirmPassword" required 
                           placeholder="Repite tu contraseña" autocomplete="new-password">
                </div>
                
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="accept-terms" required>
                        <span class="checkmark"></span>
                        Acepto los <a href="#">términos y condiciones</a>
                    </label>
                </div>
                
                <button type="submit" class="btn-primary">
                    <span>Crear cuenta</span>
                    <div class="btn-glow"></div>
                </button>
                
                <div class="form-message" id="register-message"></div>
            </form>
        </div>
        
        <button id="back-to-intro" class="back-button">
            ← Volver
        </button>
        
        <!-- New Player Notification -->
        <div id="new-player-notification" class="new-player-notification hidden">
            <span class="notification-icon">🎮</span>
            <span class="notification-text" id="notification-text"></span>
        </div>
    </div>

    <script src="js/intro.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/new-player-notifier.js"></script>
</body>
</html>
