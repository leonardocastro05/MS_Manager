<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="400" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente para el asfalto -->
    <linearGradient id="asphaltGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    
    <!-- Gradiente para los bordillos -->
    <pattern id="kerbPattern" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="5" height="10" fill="#ff0000"/>
      <rect x="5" width="5" height="10" fill="#ffffff"/>
    </pattern>
    
    <!-- Gradiente para la línea de salida -->
    <pattern id="startLinePattern" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="5" height="5" fill="#ffffff"/>
      <rect x="5" y="5" width="5" height="5" fill="#ffffff"/>
      <rect x="5" width="5" height="5" fill="#000000"/>
      <rect y="5" width="5" height="5" fill="#000000"/>
    </pattern>
    
    <!-- Flecha de dirección -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ff88"/>
    </marker>
  </defs>
  
  <!-- Fondo del circuito -->
  <rect width="500" height="400" fill="#1a472a"/>
  
  <!-- Zonas de escape (grava) -->
  <ellipse cx="425" cy="85" rx="50" ry="45" fill="#c4a574" opacity="0.6"/>
  <ellipse cx="80" cy="320" rx="45" ry="40" fill="#c4a574" opacity="0.6"/>
  
  <!-- Pista principal - Contorno exterior (más grueso) -->
  <path id="track-outer" 
        d="M 100,350 
           L 100,200 
           Q 100,160 120,130 
           L 200,50 
           Q 230,25 270,25 
           L 420,25 
           Q 460,25 475,60 
           Q 490,95 475,130 
           L 430,175 
           Q 410,195 410,220 
           L 410,280 
           Q 410,310 385,330 
           L 200,330 
           Q 150,330 120,350 
           Q 100,365 100,350 
           Z"
        fill="none" 
        stroke="#333333" 
        stroke-width="45"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Pista principal - Asfalto -->
  <path id="track-surface" 
        d="M 100,350 
           L 100,200 
           Q 100,160 120,130 
           L 200,50 
           Q 230,25 270,25 
           L 420,25 
           Q 460,25 475,60 
           Q 490,95 475,130 
           L 430,175 
           Q 410,195 410,220 
           L 410,280 
           Q 410,310 385,330 
           L 200,330 
           Q 150,330 120,350 
           Q 100,365 100,350 
           Z"
        fill="none" 
        stroke="url(#asphaltGradient)" 
        stroke-width="35"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Línea central de la pista (para guía de IA) -->
  <path id="racing-line" 
        d="M 100,350 
           L 100,200 
           Q 100,160 120,130 
           L 200,50 
           Q 230,25 270,25 
           L 420,25 
           Q 460,25 475,60 
           Q 490,95 475,130 
           L 430,175 
           Q 410,195 410,220 
           L 410,280 
           Q 410,310 385,330 
           L 200,330 
           Q 150,330 120,350 
           Q 100,365 100,350"
        fill="none" 
        stroke="#ffffff" 
        stroke-width="2"
        stroke-dasharray="15,10"
        opacity="0.4"/>
  
  <!-- Bordillos en curvas principales -->
  <!-- Curva 1 - Primera chicane -->
  <path d="M 105,185 Q 105,165 118,140" fill="none" stroke="url(#kerbPattern)" stroke-width="6"/>
  <path d="M 95,185 Q 95,165 110,140" fill="none" stroke="url(#kerbPattern)" stroke-width="6"/>
  
  <!-- Curva 2 - Segunda chicane (Variante della Roggia) -->
  <path d="M 190,60 Q 210,40 235,35" fill="none" stroke="url(#kerbPattern)" stroke-width="6"/>
  <path d="M 195,50 Q 220,30 245,25" fill="none" stroke="url(#kerbPattern)" stroke-width="6"/>
  
  <!-- Curva 3 - Curva Grande -->
  <path d="M 455,50 Q 475,70 480,100" fill="none" stroke="url(#kerbPattern)" stroke-width="6"/>
  <path d="M 465,45 Q 485,65 490,95" fill="none" stroke="url(#kerbPattern)" stroke-width="6"/>
  
  <!-- Curva 4 - Variante Ascari entrada -->
  <path d="M 440,160 Q 425,175 420,195" fill="none" stroke="url(#kerbPattern)" stroke-width="6"/>
  
  <!-- Curva 5 - Parabolica -->
  <path d="M 395,315 Q 370,330 340,335" fill="none" stroke="url(#kerbPattern)" stroke-width="6"/>
  <path d="M 400,325 Q 375,340 345,345" fill="none" stroke="url(#kerbPattern)" stroke-width="6"/>
  
  <!-- Línea de meta/salida -->
  <rect x="85" y="340" width="30" height="15" fill="url(#startLinePattern)"/>
  
  <!-- Zonas DRS -->
  <path d="M 270,25 L 400,25" fill="none" stroke="#00ff00" stroke-width="4" opacity="0.6"/>
  <text x="335" y="18" fill="#00ff00" font-size="10" text-anchor="middle" font-family="Arial">DRS 1</text>
  
  <path d="M 200,330 L 120,350" fill="none" stroke="#00ff00" stroke-width="4" opacity="0.6"/>
  <text x="160" y="355" fill="#00ff00" font-size="10" text-anchor="middle" font-family="Arial">DRS 2</text>
  
  <!-- Nombres de las curvas -->
  <text x="90" y="150" fill="#ffffff" font-size="9" font-family="Arial" opacity="0.8">Rettifilo</text>
  <text x="90" y="160" fill="#ffffff" font-size="7" font-family="Arial" opacity="0.6">Tribune</text>
  
  <text x="160" y="65" fill="#ffffff" font-size="9" font-family="Arial" opacity="0.8">Variante</text>
  <text x="160" y="75" fill="#ffffff" font-size="7" font-family="Arial" opacity="0.6">della Roggia</text>
  
  <text x="450" y="55" fill="#ffffff" font-size="9" font-family="Arial" opacity="0.8">Curva</text>
  <text x="450" y="65" fill="#ffffff" font-size="7" font-family="Arial" opacity="0.6">Grande</text>
  
  <text x="445" y="200" fill="#ffffff" font-size="9" font-family="Arial" opacity="0.8">Variante</text>
  <text x="445" y="210" fill="#ffffff" font-size="7" font-family="Arial" opacity="0.6">Ascari</text>
  
  <text x="300" y="365" fill="#ffffff" font-size="9" font-family="Arial" opacity="0.8">Parabolica</text>
  
  <!-- Indicador de salida -->
  <polygon points="95,360 105,355 105,365" fill="#ff0000"/>
  <text x="75" y="375" fill="#ff0000" font-size="8" font-family="Arial" font-weight="bold">START</text>
  
  <!-- Boxes / Pit Lane -->
  <rect x="100" y="370" width="80" height="12" fill="#444444" rx="2"/>
  <text x="140" y="379" fill="#ffffff" font-size="7" text-anchor="middle" font-family="Arial">PIT LANE</text>
  
  <!-- Flechas de dirección -->
  <path d="M 270,25 L 300,25" fill="none" stroke="#00ff88" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.7"/>
  <path d="M 100,280 L 100,250" fill="none" stroke="#00ff88" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.7"/>
  
  <!-- Waypoints para la IA (invisibles, solo para datos) -->
  <g id="ai-waypoints" opacity="0">
    <circle cx="100" cy="350" r="3" data-waypoint="0" data-type="start"/>
    <circle cx="100" cy="300" r="3" data-waypoint="1"/>
    <circle cx="100" cy="250" r="3" data-waypoint="2"/>
    <circle cx="100" cy="200" r="3" data-waypoint="3"/>
    <circle cx="110" cy="160" r="3" data-waypoint="4" data-type="brake"/>
    <circle cx="130" cy="130" r="3" data-waypoint="5" data-type="apex"/>
    <circle cx="160" cy="90" r="3" data-waypoint="6"/>
    <circle cx="200" cy="50" r="3" data-waypoint="7" data-type="brake"/>
    <circle cx="240" cy="30" r="3" data-waypoint="8" data-type="apex"/>
    <circle cx="270" cy="25" r="3" data-waypoint="9" data-type="drs-start"/>
    <circle cx="340" cy="25" r="3" data-waypoint="10"/>
    <circle cx="400" cy="25" r="3" data-waypoint="11" data-type="drs-end"/>
    <circle cx="440" cy="35" r="3" data-waypoint="12" data-type="brake"/>
    <circle cx="470" cy="70" r="3" data-waypoint="13" data-type="apex"/>
    <circle cx="475" cy="110" r="3" data-waypoint="14"/>
    <circle cx="455" cy="150" r="3" data-waypoint="15" data-type="brake"/>
    <circle cx="425" cy="180" r="3" data-waypoint="16" data-type="apex"/>
    <circle cx="410" cy="210" r="3" data-waypoint="17"/>
    <circle cx="410" cy="250" r="3" data-waypoint="18"/>
    <circle cx="410" cy="290" r="3" data-waypoint="19" data-type="brake"/>
    <circle cx="390" cy="320" r="3" data-waypoint="20" data-type="apex"/>
    <circle cx="340" cy="330" r="3" data-waypoint="21"/>
    <circle cx="270" cy="330" r="3" data-waypoint="22"/>
    <circle cx="200" cy="330" r="3" data-waypoint="23" data-type="drs-start"/>
    <circle cx="150" cy="340" r="3" data-waypoint="24"/>
    <circle cx="120" cy="350" r="3" data-waypoint="25" data-type="drs-end"/>
    <circle cx="100" cy="350" r="3" data-waypoint="26" data-type="finish"/>
  </g>
  
  <!-- Info del circuito -->
  <g id="track-info" transform="translate(10, 10)">
    <rect width="120" height="60" fill="#000000" opacity="0.7" rx="5"/>
    <text x="10" y="18" fill="#ffffff" font-size="12" font-family="Arial" font-weight="bold">MONZA</text>
    <text x="10" y="32" fill="#cccccc" font-size="8" font-family="Arial">Italia 🇮🇹</text>
    <text x="10" y="44" fill="#cccccc" font-size="8" font-family="Arial">5.793 km | 53 vueltas</text>
    <text x="10" y="55" fill="#00ff00" font-size="8" font-family="Arial">⚡ Alta velocidad</text>
  </g>
</svg>
