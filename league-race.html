<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursa de Lliga - F1 Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 60%, #e10600 100%);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                120deg,
                rgba(255, 215, 0, 0.03) 0 20px,
                transparent 20px 60px
            );
            pointer-events: none;
            z-index: 0;
        }

        #league-race-container {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .race-header {
            background: linear-gradient(135deg, rgba(35, 37, 38, 0.95) 0%, rgba(26, 26, 46, 0.95) 100%);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            text-align: center;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.2);
        }

        .race-header h1 {
            color: #ffd700;
            font-size: 2.2em;
            margin-bottom: 12px;
            font-family: 'Orbitron', Arial, sans-serif;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .race-header p {
            color: #fff;
            font-size: 1.3em;
            margin-top: 10px;
            font-family: 'Orbitron', Arial, sans-serif;
        }

        .strategy-panel {
            background: linear-gradient(135deg, rgba(35, 37, 38, 0.9) 0%, rgba(26, 26, 46, 0.9) 100%);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .strategy-panel h3 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 1.5em;
            font-family: 'Orbitron', Arial, sans-serif;
            text-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
        }

        .driver-strategy {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .driver-strategy label {
            color: #fff;
            min-width: 120px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .driver-strategy select {
            padding: 10px 15px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid #ffd700;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Orbitron', Arial, sans-serif;
            flex: 1;
        }

        .driver-strategy select:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: #ffeb3b;
        }

        .driver-strategy select:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .driver-strategy select option {
            background: #1a1a2e;
            color: #fff;
            padding: 10px;
        }

        .race-controls {
            text-align: center;
            margin: 24px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .race-controls button {
            padding: 15px 40px;
            font-size: 1.3em;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Orbitron', Arial, sans-serif;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        #start-race-btn {
            background: linear-gradient(90deg, #00a000 0%, #2ecc40 100%);
            color: white;
        }

        #start-race-btn:hover {
            background: linear-gradient(90deg, #008000 0%, #27ae60 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 204, 64, 0.4);
        }

        #pause-race-btn {
            background: linear-gradient(90deg, #ff9800 0%, #ff6b00 100%);
            color: white;
        }

        #pause-race-btn:hover {
            background: linear-gradient(90deg, #f57c00 0%, #e65100 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }

        .race-controls button:last-child {
            background: linear-gradient(90deg, #666 0%, #888 100%);
            color: white;
        }

        .race-controls button:last-child:hover {
            background: linear-gradient(90deg, #555 0%, #777 100%);
            transform: translateY(-2px);
        }

        .race-positions {
            background: linear-gradient(135deg, rgba(35, 37, 38, 0.9) 0%, rgba(26, 26, 46, 0.9) 100%);
            padding: 24px;
            border-radius: 16px;
            margin-top: 24px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .race-positions h3 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 1.5em;
            font-family: 'Orbitron', Arial, sans-serif;
            text-align: center;
            text-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
        }

        #positions-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .position-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }

        .position-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .position-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
            min-width: 50px;
            text-align: center;
        }

        .driver-info {
            flex: 1;
            margin-left: 20px;
        }

        .driver-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }

        .team-name {
            font-size: 0.9em;
            color: #aaa;
        }

        .track-display {
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <div id="league-race-container">
        <!-- HEADER -->
        <div class="race-header">
            <h1 id="league-race-title">🏆 Cursa de Lliga</h1>
            <p id="league-race-info"></p>
        </div>

        <!-- ESTRATÈGIA - NOMÉS UN PILOT -->
        <div class="strategy-panel">
            <h3>🎯 Estratègia de Neumàtics</h3>
            <div class="driver-strategy">
                <label>🏎️ El teu Pilot:</label>
                <select id="driver1-tyres">
                    <option value="soft">🔴 Tous (Ràpids però es desgasten)</option>
                    <option value="medium" selected>🟡 Mitjans (Equilibrats)</option>
                    <option value="hard">⚪ Durs (Lents però resistents)</option>
                </select>
            </div>
            <div
                style="background:rgba(255,215,0,0.1); padding:16px; border-radius:10px; margin-top:16px; text-align:center;">
                <p style="font-size:0.95em; color:#ffd700; margin:0;">
                    💡 <b>Consell:</b> Els neumàtics tous són més ràpids però es desgasten més ràpid. Els durs duren més
                    però són més lents.
                </p>
            </div>
        </div>

        <!-- PISTA -->
        <div id="track-display" class="track-display">
            <!-- La pista es generarà aquí -->
        </div>

        <!-- CONTROLS -->
        <div class="race-controls">
            <button id="start-qualifying-btn" onclick="startQualifying()">
                🏁 Començar Qualificació (3 voltes)
            </button>
            <button id="start-race-btn" onclick="startLeagueRaceNow()" style="display:none;">
                🏁 Començar Cursa
            </button>
            <button id="pause-race-btn" onclick="pauseLeagueRace()" style="display:none;">
                ⏸️ Pausar
            </button>
            <button id="pitstop-btn" onclick="enterPitStop()" style="display:none; background: linear-gradient(90deg, #ff6b00 0%, #ffd700 100%);">
                🔧 Entrar a Boxes
            </button>
            <button onclick="window.location.href='liga.html?id=' + getLeagueIdFromSession()">
                ← Tornar a la Lliga
            </button>
        </div>

        <!-- PANEL DE BOXES -->
        <div id="pitstop-panel" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #232526 0%, #414345 100%); padding: 30px; border-radius: 20px; border: 3px solid #FFD700; box-shadow: 0 8px 32px rgba(0,0,0,0.8); z-index: 1000; min-width: 400px;">
            <h2 style="color: #FFD700; text-align: center; margin-bottom: 20px;">🔧 Parada a Boxes</h2>
            <p style="color: #fff; text-align: center; margin-bottom: 20px;">Selecciona el tipus de neumàtic:</p>
            
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <button onclick="changeTyres('soft')" style="padding: 15px; font-size: 1.1em; background: linear-gradient(90deg, #D32F2F 0%, #FF6B6B 100%); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold;">
                    🔴 Neumàtics Tous (Velocitat alta, desgast ràpid)
                </button>
                <button onclick="changeTyres('medium')" style="padding: 15px; font-size: 1.1em; background: linear-gradient(90deg, #FFB300 0%, #FFD700 100%); color: #000; border: none; border-radius: 12px; cursor: pointer; font-weight: bold;">
                    🟡 Neumàtics Mitjans (Equilibrats)
                </button>
                <button onclick="changeTyres('hard')" style="padding: 15px; font-size: 1.1em; background: linear-gradient(90deg, #555 0%, #888 100%); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold;">
                    ⚪ Neumàtics Durs (Durabilitat alta, velocitat baixa)
                </button>
                <button onclick="closePitStopPanel()" style="padding: 12px; font-size: 1em; background: linear-gradient(90deg, #444 0%, #666 100%); color: white; border: none; border-radius: 12px; cursor: pointer; margin-top: 10px;">
                    ❌ Cancel·lar
                </button>
            </div>
        </div>

        <!-- CLASSIFICACIÓ -->
        <div id="race-positions" class="race-positions">
            <h3>📊 Classificació en Directe</h3>
            <div id="positions-list"></div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/popup.js"></script>
    <script src="js/data.js"></script>
    <script src="js/realistic-tracks.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/game.js"></script>
    <script src="js/online.js"></script>
    <script src="js/race-enhanced.js"></script>
    <script src="js/league-race-system.js"></script>
    <script>
        // Obtenir info de la lliga des de sessionStorage
        function getLeagueRaceInfo() {
            const info = sessionStorage.getItem('leagueRaceInfo');
            return info ? JSON.parse(info) : null;
        }

        function getLeagueIdFromSession() {
            const info = getLeagueRaceInfo();
            return info ? info.leagueId : '';
        }

        // Inicialitzar la cursa
        function initLeagueRace() {
            const info = getLeagueRaceInfo();
            if (!info) {
                alert('⚠️ No hi ha informació de la cursa!');
                window.location.href = 'online.html';
                return;
            }

            const user = getCurrentUser();
            if (!user || !user.data.onlineLeagues) {
                window.location.href = 'online.html';
                return;
            }

            const league = user.data.onlineLeagues.find(l => l.id === info.leagueId);
            if (!league || !league.calendar[info.raceIndex]) {
                alert('⚠️ Lliga o cursa no trobada!');
                window.location.href = 'online.html';
                return;
            }

            const race = league.calendar[info.raceIndex];
            const track = gameData.tracks[race.trackId];

            // Mostrar info
            document.getElementById('league-race-title').textContent = `🏆 ${league.name}`;
            document.getElementById('league-race-info').innerHTML = `
                ${track.flag} <b>${track.name}</b> • Cursa ${race.raceNumber} • ${track.laps} voltes
            `;

            // Seleccionar el circuit automàticament
            leagueRaceState.selectedTrack = race.trackId;
            displayTrack(race.trackId);
        }

        // Començar la cursa
        function startLeagueRaceNow() {
            const user = getCurrentUser();
            if (!user) {
                alert('⚠️ Error: No s\'ha trobat l\'usuari!');
                return;
            }

            if (!leagueRaceState.selectedTrack) {
                alert('⚠️ Error carregant el circuit!');
                return;
            }

            // Amagar botó començar, mostrar pausar i boxes
            document.getElementById('start-race-btn').style.display = 'none';
            document.getElementById('pause-race-btn').style.display = 'inline-block';
            document.getElementById('pitstop-btn').style.display = 'inline-block';
            document.getElementById('start-qualifying-btn').style.display = 'none';

            leagueRaceState.isRunning = true;
            leagueRaceState.currentLap = 0;

            initializeLeagueRace();
            runLeagueRaceLoop();
        }

        // Mostrar el circuit (funció del sistema normal de curses)
        function displayTrack(trackId) {
            const track = gameData.tracks[trackId];
            const trackDisplay = document.getElementById('track-display');

            const imagePath = track.image ? `img/${track.image}` : '';
            const hasImage = imagePath !== '';
            const trackClass = hasImage ? 'race-track image-track' : 'race-track';

            trackDisplay.innerHTML = `
                <div class="${trackClass}" id="race-track" 
                     style="background-image: url('${imagePath}');">
                    
                    <svg class="track-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
                        <path id="track-path" d="${track.path || ''}" class="track-path-visible"></path>
                    </svg>
                    
                    <div style="position: absolute; top: 20px; left: 20px; 
                                font-size: 2em; color: white; 
                                text-shadow: 2px 2px 8px rgba(0,0,0,0.9); z-index: 20;
                                font-family: 'Orbitron', Arial, sans-serif;">
                        ${track.flag} ${track.name}
                    </div>
                    
                    <div style="position: absolute; top: 70px; left: 20px; 
                                font-size: 1.3em; color: #ffd700; 
                                text-shadow: 2px 2px 8px rgba(0,0,0,0.9); z-index: 20;
                                font-family: 'Orbitron', Arial, sans-serif;
                                font-weight: bold;">
                        Volta: <span id="current-lap" style="color: #2ecc40;">0</span> / ${track.laps}
                    </div>
                </div>
            `;
            
            // Afegir millores visuals si la funció existeix
            if (typeof initEnhancedRaceDisplay === 'function') {
                setTimeout(() => initEnhancedRaceDisplay(trackId), 100);
            }
        }

        // Inicialitzar quan carrega la pàgina
        window.addEventListener('DOMContentLoaded', () => {
            initLeagueRace();
        });
    </script>
</body>

</html>
