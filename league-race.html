<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Manager - Cursa de Lliga</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            overflow: hidden;
        }

        .race-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .race-header {
            background: linear-gradient(135deg, rgba(225,6,0,0.3), rgba(255,215,0,0.3));
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffd700;
        }

        .race-header h2 {
            margin: 0;
            font-size: 1.8em;
        }

        .race-info-bar {
            display: flex;
            gap: 32px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .race-main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .race-track-container {
            flex: 2;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        #race-track {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            border: 3px solid #ffd700;
            position: relative;
            overflow: hidden;
        }

        .track-svg {
            width: 100%;
            height: 100%;
        }

        .driver-marker {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em;
            z-index: 10;
            transition: all 0.1s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .race-sidebar {
            flex: 1;
            background: linear-gradient(135deg, #232526, #414345);
            padding: 32px;
            overflow-y: auto;
            border-left: 3px solid #ffd700;
            min-width: 550px;
            max-width: 600px;
        }

        .positions-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .position-row {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 3px solid transparent;
            transition: all 0.2s;
            font-size: 1.3em;
        }

        .position-row.player {
            border-color: #ffd700;
            background: rgba(255,215,0,0.15);
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .position-row .pos {
            font-size: 2.5em;
            font-weight: 900;
            min-width: 70px;
            text-align: center;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }

        .position-row .driver-info {
            flex: 1;
        }

        .position-row .laps {
            color: #00bcd4;
            font-size: 0.9em;
        }

        .race-controls {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 2px solid #333;
        }

        .control-btn {
            width: 100%;
            padding: 14px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .btn-start {
            background: linear-gradient(90deg, #2ecc40, #27ae60);
            color: #fff;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(46,204,64,0.5);
        }

        .btn-pause {
            background: linear-gradient(90deg, #f39c12, #e67e22);
            color: #fff;
        }

        .btn-pause:hover {
            transform: scale(1.05);
        }

        .btn-exit {
            background: rgba(225,6,0,0.8);
            color: #fff;
        }

        .btn-exit:hover {
            background: rgba(225,6,0,1);
        }

        .tyre-selection {
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 16px;
        }

        .tyre-selection h4 {
            margin-bottom: 12px;
            color: #ffd700;
        }

        .tyre-option {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
        }

        .tyre-option select {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 2px solid #333;
            background: #222;
            color: #fff;
            font-size: 1em;
        }

        @media (max-width: 1024px) {
            .race-main {
                flex-direction: column;
            }

            .race-sidebar {
                max-width: 100%;
                max-height: 300px;
                border-left: none;
                border-top: 2px solid #333;
            }
        }
    </style>
</head>
<body>
    <div class="race-container">
        <!-- Header -->
        <div class="race-header">
            <h2 id="race-title" style="font-size:2em;">🏁 Cursa de Lliga</h2>
            <div class="race-info-bar" style="font-size:1.5em; gap:48px;">
                <div style="background:rgba(255,215,0,0.2); padding:12px 24px; border-radius:10px; border:2px solid #ffd700;">
                    🏎️ Volta: <span id="current-lap" style="color:#ffd700; font-size:1.3em; font-weight:900;">0</span>/<span id="total-laps" style="font-size:1.1em;">50</span>
                </div>
                <div style="background:rgba(255,215,0,0.2); padding:12px 24px; border-radius:10px; border:2px solid #ffd700;">
                    🪙 <span id="race-coins" style="color:#ffd700; font-size:1.3em; font-weight:900;">0</span>
                </div>
            </div>
        </div>

        <!-- Contingut Principal -->
        <div class="race-main">
            <!-- Circuit -->
            <div class="race-track-container">
                <div id="race-track">
                    <!-- El traçat es carregarà dinàmicament -->
                </div>
            </div>

            <!-- Barra lateral -->
            <div class="race-sidebar">
                <h3 style="margin-bottom: 24px; text-align: center; font-size:2.2em; color:#ffd700; text-shadow: 0 0 15px rgba(255,215,0,0.5);">📊 Classificació en Directe</h3>

                <!-- Selecció de pneumàtics ABANS de començar -->
                <div id="pre-race-setup" style="display: block;">
                    <div class="tyre-selection">
                        <h4>🏎️ Configuració del Pilot</h4>
                        <div class="tyre-option">
                            <label>Pneumàtics:</label>
                            <select id="driver1-tyres">
                                <option value="soft">🔴 Tous (Velocitat màxima, desgast ràpid)</option>
                                <option value="medium" selected>🟡 Mitjos (Equilibrats)</option>
                                <option value="hard">⚪ Durs (Duradors, menys velocitat)</option>
                            </select>
                        </div>
                    </div>

                    <button id="start-qualifying-btn" class="control-btn btn-start" onclick="startQualifying()">
                        🏁 Començar Qualificació
                    </button>
                    <button id="start-race-btn" class="control-btn btn-start" onclick="startRace()" style="display:none;">
                        🏁 Començar Cursa
                    </button>
                </div>

                <!-- Llista de posicions -->
                <div id="positions-list" class="positions-list">
                    <!-- S'omplirà dinàmicament -->
                </div>

                <!-- Controls durant la cursa -->
                <div class="race-controls" id="race-controls" style="display:none;">
                    <button class="control-btn btn-exit" onclick="confirmExit()">
                        ❌ Sortir de la Cursa
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/game.js"></script>
    <script src="js/app.js"></script>
    <script src="js/popup.js"></script>
    <script src="js/online-data.js"></script>
    <script src="js/online.js"></script>
    <script src="js/realistic-tracks.js"></script>
    <script src="js/league-race-system.js"></script>

    <script>
        /**
         * Inicialitzar la pàgina de cursa
         */
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            // Obtenir info de la cursa del sessionStorage
            const raceInfo = JSON.parse(sessionStorage.getItem('leagueRaceInfo') || '{}');
            if (!raceInfo.leagueId || !raceInfo.trackId) {
                alert('⚠️ Error: No hi ha informació de la cursa!');
                window.location.href = 'online.html';
                return;
            }

            // Carregar circuit
            console.log('🏁 Debug - trackId:', raceInfo.trackId);
            console.log('🏁 Debug - realisticTracks disponible?', typeof realisticTracks !== 'undefined');
            console.log('🏁 Debug - renderRealisticTrack?', typeof renderRealisticTrack);
            
            const track = gameData.tracks[raceInfo.trackId];
            if (track) {
                document.getElementById('race-title').textContent = `${track.flag || '🏎️'} ${track.name}`;
                document.getElementById('total-laps').textContent = track.laps;
                leagueRaceState.selectedTrack = raceInfo.trackId;
                
                // Renderitzar traçat realista
                const raceTrack = document.getElementById('race-track');
                if (raceTrack) {
                    console.log('🏁 Intentant renderitzar traçat...');
                    // Provar primer amb realisticTracks
                    if (typeof renderRealisticTrack === 'function' && typeof realisticTracks !== 'undefined' && realisticTracks[raceInfo.trackId]) {
                        console.log('✅ Carregant traçat realista per:', raceInfo.trackId);
                        renderRealisticTrack(raceInfo.trackId, raceTrack);
                        console.log('✅ Traçat renderitzat!');
                    } 
                    // Si no, utilitzar el path de gameData.tracks
                    else if (track.path) {
                        console.log('📌 Utilitzant traçat de gameData per:', raceInfo.trackId);
                        raceTrack.innerHTML = `
                            <svg class="track-svg" viewBox="0 0 900 700" preserveAspectRatio="xMidYMid meet">
                                <defs>
                                    <linearGradient id="track-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#444; stop-opacity:1" />
                                        <stop offset="50%" style="stop-color:#333; stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#222; stop-opacity:1" />
                                    </linearGradient>
                                </defs>
                                <!-- Zona verda fora de pista -->
                                <path d="${track.path}" fill="none" stroke="#1a4d1a" stroke-width="100" opacity="0.3" />
                                <!-- Vorera vermella -->
                                <path d="${track.path}" fill="none" stroke="#cc0000" stroke-width="75" />
                                <!-- Asfalt -->
                                <path d="${track.path}" fill="none" stroke="url(#track-gradient)" stroke-width="60" />
                                <!-- Path invisible per seguiment -->
                                <path id="track-path" d="${track.path}" fill="none" stroke="transparent" stroke-width="60" />
                                <!-- Línia de sortida -->
                                <rect x="130" y="280" width="40" height="70" fill="#fff" opacity="0.8" />
                                <rect x="130" y="280" width="20" height="70" fill="#000" />
                                <rect x="150" y="280" width="20" height="70" fill="#fff" />
                            </svg>
                        `;
                    }
                    // Fallback final
                    else {
                        console.warn('⚠️ Traçat no disponible, utilitzant per defecte');
                        raceTrack.innerHTML = `
                            <svg class="track-svg" viewBox="0 0 900 700" preserveAspectRatio="xMidYMid meet">
                                <defs>
                                    <linearGradient id="track-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#444; stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#222; stop-opacity:1" />
                                    </linearGradient>
                                </defs>
                                <ellipse cx="450" cy="350" rx="350" ry="250" fill="none" stroke="#1a4d1a" stroke-width="100" opacity="0.3" />
                                <ellipse cx="450" cy="350" rx="350" ry="250" fill="none" stroke="#cc0000" stroke-width="75" />
                                <ellipse cx="450" cy="350" rx="350" ry="250" fill="none" stroke="url(#track-gradient)" stroke-width="60" />
                                <ellipse id="track-path" cx="450" cy="350" rx="350" ry="250" fill="none" stroke="transparent" stroke-width="60" />
                                <rect x="430" y="80" width="40" height="70" fill="#fff" opacity="0.8" />
                                <rect x="430" y="80" width="20" height="70" fill="#000" />
                            </svg>
                        `;
                    }
                }
            }

            // Mostrar coins actuals
            if (user.data.online) {
                document.getElementById('race-coins').textContent = user.data.online.coins;
            }
        });

        /**
         * Començar la cursa principal
         */
        function startRace() {
            console.log('🏁 Iniciant cursa principal...');
            
            // Ocultar botó start i mostrar controls
            document.getElementById('start-race-btn').style.display = 'none';
            document.getElementById('start-qualifying-btn').style.display = 'none';
            
            // Restaurar posicions després de qualificació
            const track = gameData.tracks[leagueRaceState.selectedTrack];
            if (track.originalLaps) {
                track.laps = track.originalLaps;
            }

            // Reiniciar comptadors
            leagueRaceState.currentLap = 0;
            leagueRaceState.positions.forEach(driver => {
                driver.completedLaps = 0;
                driver.lapProgress = 0;
            });

            // Iniciar cursa
            leagueRaceState.isRunning = true;
            leagueRaceState.qualifyingActive = false;
            
            console.log('✅ Cursa iniciada amb', track.laps, 'voltes');
            runLeagueRaceLoop();
        }

        /**
         * Confirmar sortida de la cursa
         */
        function confirmExit() {
            if (confirm('⚠️ Segur que vols sortir? Perdràs tot el progrés de la cursa!')) {
                const raceInfo = JSON.parse(sessionStorage.getItem('leagueRaceInfo') || '{}');
                window.location.href = `liga.html?id=${raceInfo.leagueId}`;
            }
        }

        /**
         * Carregar SVG personalitzat del circuitapp.js:175 Uncaught TypeError: Cannot read properties of null (reading 'addEventListener')
         */
        function loadTrackSVG(svgPath) {
            // Funció per carregar SVG personalitzat si està disponible
            fetch(svgPath)
                .then(response => response.text())
                .then(svg => {
                    const raceTrack = document.getElementById('race-track');
                    raceTrack.innerHTML = svg;
                })
                .catch(err => {
                    console.warn('No s\'ha pogut carregar el SVG del circuit:', err);
                });
        }
    </script>
</body>
</html>
